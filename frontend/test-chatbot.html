<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auracare Chatbot API Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 30px;
        }
        
        .section {
            margin-bottom: 30px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .section-title {
            background: #f8f9fa;
            padding: 15px 20px;
            font-weight: bold;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section-title:hover {
            background: #e9ecef;
        }
        
        .section-content {
            padding: 20px;
            display: none;
        }
        
        .section-content.active {
            display: block;
        }
        
        .status {
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: scale(1.02);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
            font-family: inherit;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
            font-family: monospace;
            margin-top: 10px;
        }
        
        .response-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 4px solid #667eea;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .chat-message {
            margin-bottom: 15px;
            display: flex;
        }
        
        .chat-message.user {
            justify-content: flex-end;
        }
        
        .chat-message.bot {
            justify-content: flex-start;
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .chat-message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .chat-message.bot .message-bubble {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        
        .timestamp {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        .chat-container {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            background: #fafafa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧴 Auracare Chatbot API Test</h1>
            <p>Test the skincare chatbot endpoint</p>
        </div>
        
        <div class="content">
            <!-- Server Status -->
            <div id="serverStatus" class="status info">
                🔍 Checking server connection...
            </div>
            
            <!-- Test Sections -->
            <div class="section">
                <div class="section-title" onclick="toggleSection('testSection')">
                    <span>📡 1. Test Endpoints</span>
                    <span>▼</span>
                </div>
                <div id="testSection" class="section-content">
                    <button onclick="testRoot()">Test Root Endpoint</button>
                    <button onclick="testChatbotTest()">Test Chatbot Test Endpoint</button>
                    <div id="testResults"></div>
                </div>
            </div>
            
            <div class="section">
                <div class="section-title" onclick="toggleSection('chatSection')">
                    <span>💬 2. Chat with Bot</span>
                    <span>▼</span>
                </div>
                <div id="chatSection" class="section-content">
                    <div id="chatMessages" class="chat-container">
                        <div class="chat-message bot">
                            <div class="message-bubble">
                                Hi! I'm your Skincare Assistant. 👋<br><br>
                                Ask me anything about skincare!
                                <div class="timestamp">Just now</div>
                            </div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="chatInput" placeholder="Type your skincare question..." onkeypress="handleChatKeyPress(event)">
                        <button onclick="sendChatMessage()">Send</button>
                    </div>
                </div>
            </div>
            
            <div class="section">
                <div class="section-title" onclick="toggleSection('customSection')">
                    <span>🔧 3. Custom Request</span>
                    <span>▼</span>
                </div>
                <div id="customSection" class="section-content">
                    <textarea id="customMessage" placeholder="Enter your message here...">I have oily skin with acne, what products do you recommend?</textarea>
                    <button onclick="sendCustomRequest()">Send Custom Request</button>
                    <div id="customResponse"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';
        
        // Check server status on load
        async function checkServerStatus() {
            const statusDiv = document.getElementById('serverStatus');
            try {
                const response = await fetch(`${API_BASE}/`);
                const data = await response.text();
                statusDiv.className = 'status success';
                statusDiv.innerHTML = '✅ Server is running! Response: ' + data;
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Cannot connect to server. Make sure backend is running on port 5000<br>Error: ' + error.message;
            }
        }
        
        // Test root endpoint
        async function testRoot() {
            const resultsDiv = document.getElementById('testResults');
            resultsDiv.innerHTML = '<div class="loading"></div> Testing root endpoint...';
            
            try {
                const response = await fetch(`${API_BASE}/`);
                const data = await response.text();
                resultsDiv.innerHTML = `
                    <div class="response-box">
                        <strong>✅ Root Endpoint Response:</strong><br>
                        <pre>${data}</pre>
                    </div>
                `;
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="status error">
                        ❌ Error: ${error.message}
                    </div>
                `;
            }
        }
        
        // Test chatbot test endpoint
        async function testChatbotTest() {
            const resultsDiv = document.getElementById('testResults');
            resultsDiv.innerHTML = '<div class="loading"></div> Testing chatbot test endpoint...';
            
            try {
                const response = await fetch(`${API_BASE}/api/chatbot/test`);
                const data = await response.json();
                resultsDiv.innerHTML = `
                    <div class="response-box">
                        <strong>✅ Chatbot Test Endpoint Response:</strong><br>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="status error">
                        ❌ Error: ${error.message}<br>
                        Make sure the chatbot route is registered in server.js
                    </div>
                `;
            }
        }
        
        // Send chat message
        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Add user message to chat
            addMessageToChat('user', message);
            input.value = '';
            
            // Add loading indicator
            const loadingId = addLoadingMessage();
            
            try {
                const response = await fetch(`${API_BASE}/api/chatbot/skincare-query`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        message: message,
                        isLoggedIn: false 
                    })
                });
                
                const data = await response.json();
                
                // Remove loading message
                removeLoadingMessage(loadingId);
                
                if (data.success) {
                    addMessageToChat('bot', data.response);
                    
                    if (data.products && data.products.length > 0) {
                        let productText = '\n\n✨ Recommended Products:\n';
                        data.products.forEach(p => {
                            productText += `• ${p.name} (${p.brand}) - $${p.price}\n`;
                        });
                        addMessageToChat('bot', productText);
                    }
                } else {
                    addMessageToChat('bot', 'Sorry, I had trouble processing that. Please try again!');
                }
            } catch (error) {
                removeLoadingMessage(loadingId);
                addMessageToChat('bot', `Error: ${error.message}. Make sure backend is running on port 5000`);
                console.error('Error:', error);
            }
        }
        
        // Send custom request
        async function sendCustomRequest() {
            const message = document.getElementById('customMessage').value;
            const responseDiv = document.getElementById('customResponse');
            
            if (!message) {
                responseDiv.innerHTML = '<div class="status error">Please enter a message</div>';
                return;
            }
            
            responseDiv.innerHTML = '<div class="loading"></div> Sending request...';
            
            try {
                const response = await fetch(`${API_BASE}/api/chatbot/skincare-query`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        message: message,
                        isLoggedIn: false 
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    responseDiv.innerHTML = `
                        <div class="response-box">
                            <strong>🤖 Bot Response:</strong><br>
                            <div style="white-space: pre-wrap;">${data.response}</div>
                            ${data.products && data.products.length > 0 ? `
                                <hr>
                                <strong>✨ Recommended Products:</strong><br>
                                ${data.products.map(p => `• ${p.name} (${p.brand}) - $${p.price}`).join('<br>')}
                            ` : ''}
                        </div>
                    `;
                } else {
                    responseDiv.innerHTML = `
                        <div class="status error">
                            Error: ${data.message}
                        </div>
                    `;
                }
            } catch (error) {
                responseDiv.innerHTML = `
                    <div class="status error">
                        ❌ Error: ${error.message}
                    </div>
                `;
            }
        }
        
        // Helper functions for chat
        let messageId = 0;
        
        function addMessageToChat(sender, text) {
            const chatContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${sender}`;
            messageDiv.id = `msg-${messageId++}`;
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    ${text.replace(/\n/g, '<br>')}
                    <div class="timestamp">${time}</div>
                </div>
            `;
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return messageDiv.id;
        }
        
        function addLoadingMessage() {
            const chatContainer = document.getElementById('chatMessages');
            const loadingId = `loading-${Date.now()}`;
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'chat-message bot';
            loadingDiv.id = loadingId;
            loadingDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="loading"></div> Thinking...
                </div>
            `;
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return loadingId;
        }
        
        function removeLoadingMessage(loadingId) {
            const loadingMsg = document.getElementById(loadingId);
            if (loadingMsg) {
                loadingMsg.remove();
            }
        }
        
        function handleChatKeyPress(event) {
            if (event.key === 'Enter') {
                sendChatMessage();
            }
        }
        
        function toggleSection(sectionId) {
            const section = document.getElementById(sectionId);
            section.classList.toggle('active');
        }
        
        // Initialize
        checkServerStatus();
        
        // Auto-expand first section
        setTimeout(() => {
            document.getElementById('testSection').classList.add('active');
        }, 500);
    </script>
</body>
</html>
